<body class="bg-surface text-on-surface font-body-sm min-h-screen flex flex-col items-center justify-center relative overflow-hidden">
<!-- Top AppBar Suppressed: Transactional/Onboarding Intent -->
<main class="w-full max-w-md mx-auto px-margin-edge py-stack-lg flex flex-col min-h-[884px] relative z-10">
<!-- Top Action / Skip -->
<div class="flex justify-between items-center mb-stack-lg">
<button aria-label="Go back" class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center text-on-surface hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined text-[20px]">arrow_back</span>
</button>
<button class="font-body-sm text-body-sm font-medium text-outline hover:text-on-surface transition-colors">
                Skip
            </button>
</div>
<!-- Content Area -->
<div class="flex-1 flex flex-col justify-center">
<!-- Visual Illustration -->
<div class="relative w-full aspect-square mb-stack-lg flex items-center justify-center">
<!-- Abstract phone background -->
<div class="absolute inset-0 bg-gradient-to-br from-surface-container-high to-surface-container rounded-full opacity-50"></div>
<!-- Phone Representation -->
<div class="relative w-40 h-80 bg-primary-container rounded-[28px] shadow-[0_8px_32px_rgba(30,16,88,0.15)] flex items-center justify-center overflow-hidden border-4 border-surface-container-lowest">
<!-- Ripple Effect -->
<div class="absolute w-20 h-20 bg-secondary/30 rounded-full opacity-0 animate-ping" style="animation-duration: 2s; animation-iteration-count: infinite;"></div>
<div class="absolute w-12 h-12 bg-secondary/50 rounded-full"></div>
<!-- App Icon / Finger tap indicator -->
<span class="material-symbols-outlined text-on-primary text-[32px] absolute z-10" style="font-variation-settings: 'FILL' 1;">touch_app</span>
</div>
</div>
<!-- Typography -->
<div class="text-center mb-stack-lg">
<h1 class="font-display-lg text-display-lg text-primary-container mb-stack-sm">
                    Magic Shortcuts
                </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">
                    Double-tap the back of your phone to instantly log an expense.
                </p>
</div>
</div>
<!-- Bottom Actions & Progress -->
<div class="mt-auto pt-stack-lg">
<!-- Progress Indicator -->
<div class="flex items-center justify-center gap-2 mb-stack-lg">
<div class="w-2 h-2 rounded-full bg-surface-container-highest"></div>
<div class="w-2 h-2 rounded-full bg-surface-container-highest"></div>
<div class="w-6 h-2 rounded-full bg-secondary"></div>
<div class="w-2 h-2 rounded-full bg-surface-container-highest"></div>
<div class="w-2 h-2 rounded-full bg-surface-container-highest"></div>
<div class="w-2 h-2 rounded-full bg-surface-container-highest"></div>
</div>

<button class="w-full bg-[#EDD900] text-[#1E1058] font-body-sm text-body-lg font-bold py-4 rounded-xl flex items-center justify-center hover:opacity-90 active:scale-[0.98] transition-all duration-200">

            </button>
</div>
